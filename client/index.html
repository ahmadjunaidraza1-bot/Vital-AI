<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Verification -->
    <meta name="google-site-verification" content="P4TBQ-iNyn61zbA7NodzN71aXOBXbo_W9jvFGlnnw5s" />

    <!-- SEO -->
    <title>VITAL AI | AI Websites, Product Visuals & Digital Marketing</title>

    <meta
      name="description"
      content="VITAL AI is a UK-based digital agency offering AI-powered websites, product visualization, social media marketing, SEO, and digital growth solutions for modern businesses."
    />

    <meta
      name="keywords"
      content="AI website design, web development UK, product visualization, social media marketing, SEO services, digital marketing agency UK, Vital AI"
    />

    <meta name="author" content="VITAL AI" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->

    <!-- Favicon -->
    <link rel="icon" type="image/webp" href="/Images/logo.webp" />

    <!-- Open Graph (Facebook / WhatsApp) -->
    <meta property="og:title" content="VITAL AI | AI Websites & Digital Growth Solutions" />
    <meta
      property="og:description"
      content="AI-powered websites, product visuals, SEO, and social media marketing solutions for modern businesses."
    />
    <meta property="og:image" content="https://www.vitalai.co.uk/Images/logo.webp" />
    <meta property="og:url" content="https://www.vitalai.co.uk/" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VITAL AI | AI Digital Solutions" />
    <meta
      name="twitter:description"
      content="AI-powered websites, product visuals & marketing solutions."
    />
    <meta name="twitter:image" content="https://www.vitalai.co.uk/Images/logo.webp" />

    <!-- Performance Optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Theme -->
    <meta name="theme-color" content="#7c3aed" />
